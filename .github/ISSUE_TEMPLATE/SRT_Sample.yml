name: Submit an SRT Sample
description: Help improve compatibility by sharing a sample SRT file
title: "[SRT Sample] "
labels:
  - srt-sample

body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an SRT sample!
        Please provide a small excerpt of 5 subtitle entries.

  - type: input
    id: manufacturer
    attributes:
      label: Manufacturer
      placeholder: DJI, Autel, Potensic, FIMI, etc.
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Device Model
      placeholder: Mini 4 Pro
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Firmware Version (optional)
      placeholder: v01.00.0500
    validations:
      required: false

  - type: dropdown
    id: source
    attributes:
      label: SRT Source (optional)
      options:
        - Standalone .srt file
        - Embedded subtitle track in MP4
        - Other
    validations:
      required: false

  - type: textarea
    id: sample
    attributes:
      label: SRT Sample
      placeholder: Paste 5 consecutive or representative entries here
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Acknowledgment
      description: Please confirm before submitting
      options:
        - label: I understand that SRT files may contain GPS coordinates and telemetry. I am aware that anything not redacted will be publicly visible in this GitHub issue.
          required: true